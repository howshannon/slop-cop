\
name: Security and quality

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  security-and-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Static safety gate
        shell: bash
        run: |
          set -euo pipefail

          test -f SKILL.md
          test -d references
          test "$(find . -path ./.git -prune -o -type l -print | wc -l)" -eq 0

          ! rg -n '^[[:space:]]*pull_request[_]target[[:space:]]*:' .github/workflows

          while IFS= read -r line; do
            ref=${line#*@}
            ref=${ref%%[[:space:]#]*}
            [[ "$ref" =~ ^[0-9a-f]{40}$ ]]
          done < <(rg -o 'uses:[[:space:]]*[^[:space:]#]+@[^[:space:]#]+' .github/workflows)

          ! rg -n -i --hidden \
            --glob '!.git/**' \
            --glob '!scripts/security_scan.sh' \
            --glob '!.github/workflows/security.yml' \
            '(curl|wget)[[:space:]].*\|[[:space:]]*(sh|bash)|base64[[:space:]]+(-d|--decode).*(sh|bash)|chmod[[:space:]]+\+s|/dev/tcp/|powershell.*(-enc|-encodedcommand)|Invoke-Expression' .

          while IFS= read -r -d '' script; do
            bash -n "$script"
          done < <(find . -path ./.git -prune -o -type f \
            \( -name '*.sh' -o -path './.githooks/*' \) -print0)

      - name: Validate skill and benchmark fixtures
        shell: bash
        run: |
          python3 scripts/validate_repo.py
          python3 scripts/validate_cases.py

      - name: Verify package contents
        shell: bash
        run: |
          bash scripts/build_skill.sh
          python3 - <<'PY'
          from pathlib import Path
          import zipfile

          path = Path("dist/slop-cop.skill")
          with zipfile.ZipFile(path) as archive:
              assert "slop-cop/SKILL.md" in archive.namelist()
              assert archive.testzip() is None
          print(f"Validated {path}")
          PY
